<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Air Draw ✦</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
  #container { position: relative; width: 100vw; height: 100vh; }
  #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); opacity: 0.85; }
  #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
  #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

  #toolbar {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,20,0.85); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 60px;
    padding: 12px 24px; display: flex; align-items: center; gap: 16px;
    pointer-events: all;
  }

  .color-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent;
    cursor: pointer; transition: transform 0.15s, border-color 0.15s;
  }
  .color-btn:hover { transform: scale(1.2); }
  .color-btn.active { border-color: white; transform: scale(1.25); }

  .divider { width: 1px; height: 28px; background: rgba(255,255,255,0.15); }

  .slider-wrap { display: flex; align-items: center; gap: 8px; }
  .slider-wrap label { color: rgba(255,255,255,0.5); font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; }
  input[type=range] {
    -webkit-appearance: none; width: 80px; height: 3px;
    background: rgba(255,255,255,0.2); border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: white; cursor: pointer;
  }

  .icon-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15); border-radius: 50%;
    width: 34px; height: 34px; color: rgba(255,255,255,0.6); cursor: pointer;
    font-size: 15px; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.1); color: white; }

  #status {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,20,0.8); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px; padding: 6px 18px;
    color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 0.03em;
    pointer-events: none; transition: opacity 0.3s;
  }

  #gesture-indicator {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
    font-size: 32px; opacity: 0; transition: opacity 0.2s;
    pointer-events: none;
  }

  #hint {
    position: absolute; top: 20px; right: 24px;
    background: rgba(10,10,20,0.8); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 12px 16px;
    color: rgba(255,255,255,0.5); font-size: 12px; line-height: 1.8;
    pointer-events: none;
  }
  #hint span { color: rgba(255,255,255,0.85); font-weight: 600; }

  #loading {
    position: absolute; inset: 0; background: #0a0a0f;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; color: white; font-size: 15px; letter-spacing: 0.05em;
    z-index: 100;
  }
  .spinner {
    width: 40px; height: 40px; border: 2px solid rgba(255,255,255,0.1);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .load-sub { color: rgba(255,255,255,0.4); font-size: 12px; }
</style>
</head>
<body>
<div id="container">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="ui">
    <div id="loading">
      <div class="spinner"></div>
      <div>Loading hand tracking AI...</div>
      <div class="load-sub">Allow camera access when prompted</div>
    </div>

    <div id="status">Initializing...</div>
    <div id="gesture-indicator"></div>

    <div id="hint">
      <span>☝ index finger</span> — draw<br>
      <span>✋ open palm</span> — erase<br>
      <span>🤏 pinch</span> — grab & move<br>
      <span>✌ two fingers</span> — stop drawing
    </div>

    <div id="toolbar">
      <button class="color-btn active" data-color="#39ff14" style="background:#39ff14"></button>
      <button class="color-btn" data-color="#00cfff" style="background:#00cfff"></button>
      <button class="color-btn" data-color="#ff3cac" style="background:#ff3cac"></button>
      <button class="color-btn" data-color="#ffd700" style="background:#ffd700"></button>
      <button class="color-btn" data-color="#bf5fff" style="background:#bf5fff"></button>
      <button class="color-btn" data-color="#ff6b35" style="background:#ff6b35"></button>
      <button class="color-btn" data-color="#ffffff" style="background:#ffffff"></button>

      <div class="divider"></div>

      <div class="slider-wrap">
        <label>Size</label>
        <input type="range" id="sizeSlider" min="2" max="30" value="6">
      </div>

      <div class="divider"></div>

      <button class="icon-btn" id="undoBtn" title="Undo">↩</button>
      <button class="icon-btn" id="clearBtn" title="Clear">✕</button>
      <button class="icon-btn" id="saveBtn" title="Save">↓</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script>
const video = document.getElementById('webcam');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const loading = document.getElementById('loading');
const statusEl = document.getElementById('status');
const gestureEl = document.getElementById('gesture-indicator');

let currentColor = '#39ff14';
let brushSize = 6;
let strokes = [];
let currentStroke = null;
let isDrawing = false;
let isPinching = false;
let pinchOffsetX = 0, pinchOffsetY = 0;
let lastX = -1, lastY = -1;
let gestureTimeout = null;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  redraw();
}
window.addEventListener('resize', resize);
resize();

function showGesture(emoji) {
  gestureEl.textContent = emoji;
  gestureEl.style.opacity = '1';
  clearTimeout(gestureTimeout);
  gestureTimeout = setTimeout(() => gestureEl.style.opacity = '0', 600);
}

function redraw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const stroke of strokes) drawStroke(stroke);
  if (currentStroke) drawStroke(currentStroke);
}

function drawStroke(stroke) {
  if (stroke.points.length < 2) return;
  ctx.save();
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = stroke.size;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = stroke.color;
  ctx.shadowBlur = stroke.size * 2.5;
  ctx.globalAlpha = 0.95;
  ctx.beginPath();
  ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
  for (let i = 1; i < stroke.points.length; i++) {
    const p0 = stroke.points[i - 1];
    const p1 = stroke.points[i];
    ctx.quadraticCurveTo(p0.x, p0.y, (p0.x + p1.x) / 2, (p0.y + p1.y) / 2);
  }
  ctx.stroke();
  ctx.restore();
}

function getLandmark(landmarks, idx) {
  const lm = landmarks[idx];
  return { x: (1 - lm.x) * canvas.width, y: lm.y * canvas.height };
}

function dist(a, b) {
  return Math.hypot(a.x - b.x, a.y - b.y);
}

function isFingerUp(landmarks, tip, pip) {
  return landmarks[tip].y < landmarks[pip].y;
}

function countFingersUp(landmarks) {
  let count = 0;
  const pairs = [[8,6],[12,10],[16,14],[20,18]];
  for (const [tip, pip] of pairs) {
    if (isFingerUp(landmarks, tip, pip)) count++;
  }
  return count;
}

function onResults(results) {
  redraw();

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    if (isDrawing) {
      if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
      isDrawing = false;
    }
    statusEl.textContent = 'Show your hand to the camera';
    return;
  }

  const landmarks = results.multiHandLandmarks[0];
  const indexTip = getLandmark(landmarks, 8);
  const thumbTip = getLandmark(landmarks, 4);
  const wrist = getLandmark(landmarks, 0);
  const middleTip = getLandmark(landmarks, 12);

  const fingersUp = countFingersUp(landmarks);
  const pinchDist = dist(indexTip, thumbTip);
  const isPinchGesture = pinchDist < 40;

  // Detect open palm (erase) — 4+ fingers up and hand spread
  const handSpread = dist(getLandmark(landmarks, 4), getLandmark(landmarks, 20));
  const isOpenPalm = fingersUp >= 4 && handSpread > 180;

  // Draw cursor dot
  ctx.save();
  ctx.beginPath();
  ctx.arc(indexTip.x, indexTip.y, 8, 0, Math.PI * 2);
  ctx.fillStyle = isOpenPalm ? 'rgba(255,80,80,0.8)' : isPinchGesture ? 'rgba(255,220,0,0.9)' : currentColor;
  ctx.shadowColor = currentColor;
  ctx.shadowBlur = 15;
  ctx.fill();
  ctx.restore();

  // ERASE mode
  if (isOpenPalm) {
    statusEl.textContent = '✋ Erasing...';
    showGesture('✋');
    if (isDrawing) {
      if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
      isDrawing = false;
    }
    const eraseRadius = 60;
    const cx = indexTip.x, cy = indexTip.y;
    // Draw erase circle
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, eraseRadius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,80,80,0.6)';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
    // Remove strokes within radius
    strokes = strokes.filter(stroke => {
      return !stroke.points.some(p => Math.hypot(p.x - cx, p.y - cy) < eraseRadius);
    });
    redraw();
    return;
  }

  // PINCH mode — grab and move all strokes
  if (isPinchGesture) {
    const midX = (indexTip.x + thumbTip.x) / 2;
    const midY = (indexTip.y + thumbTip.y) / 2;

    if (!isPinching) {
      isPinching = true;
      pinchOffsetX = midX;
      pinchOffsetY = midY;
      showGesture('🤏');
      statusEl.textContent = '🤏 Grabbing...';
      if (isDrawing) {
        if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
        isDrawing = false;
      }
    } else {
      const dx = midX - pinchOffsetX;
      const dy = midY - pinchOffsetY;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
        for (const stroke of strokes) {
          for (const p of stroke.points) { p.x += dx; p.y += dy; }
        }
        pinchOffsetX = midX;
        pinchOffsetY = midY;
        redraw();
      }
    }
    return;
  }

  isPinching = false;

  // TWO FINGERS — stop drawing
  if (fingersUp >= 2) {
    if (isDrawing) {
      if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
      isDrawing = false;
      showGesture('✌');
    }
    statusEl.textContent = '✌ Ready — point one finger to draw';
    lastX = -1; lastY = -1;
    return;
  }

  // ONE FINGER — draw
  if (fingersUp === 1 && isFingerUp(landmarks, 8, 6)) {
    statusEl.textContent = '☝ Drawing...';
    const x = indexTip.x, y = indexTip.y;
    const moved = lastX < 0 || Math.hypot(x - lastX, y - lastY) > 2;

    if (!isDrawing) {
      isDrawing = true;
      currentStroke = { color: currentColor, size: brushSize, points: [] };
    }

    if (moved && currentStroke) {
      currentStroke.points.push({ x, y });
      drawStroke(currentStroke);
      lastX = x; lastY = y;
    }
    return;
  }

  // Idle
  if (isDrawing) {
    if (currentStroke) { strokes.push(currentStroke); currentStroke = null; }
    isDrawing = false;
  }
  statusEl.textContent = '☝ Point your index finger to draw';
  lastX = -1; lastY = -1;
}

// Init MediaPipe Hands
const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6
});

hands.onResults(onResults);

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720, facingMode: 'user' } });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    await video.play();

    loading.style.display = 'none';
    statusEl.textContent = '☝ Point your index finger to draw';

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 1280, height: 720
    });
    camera.start();
  } catch (e) {
    loading.innerHTML = `<div style="color:#ff6b6b; font-size:15px;">Camera access denied</div><div class="load-sub">Please allow camera in your browser settings and refresh</div>`;
  }
}

startCamera();

// Color buttons
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
  });
});

// Brush size
document.getElementById('sizeSlider').addEventListener('input', e => {
  brushSize = parseInt(e.target.value);
});

// Undo
document.getElementById('undoBtn').addEventListener('click', () => {
  strokes.pop();
  redraw();
});

// Clear
document.getElementById('clearBtn').addEventListener('click', () => {
  strokes = [];
  currentStroke = null;
  isDrawing = false;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
});

// Save
document.getElementById('saveBtn').addEventListener('click', () => {
  const saveCanvas = document.createElement('canvas');
  saveCanvas.width = canvas.width;
  saveCanvas.height = canvas.height;
  const sCtx = saveCanvas.getContext('2d');
  sCtx.drawImage(video, 0, 0, canvas.width, canvas.height);
  sCtx.save();
  sCtx.scale(-1, 1);
  sCtx.drawImage(canvas, -canvas.width, 0);
  sCtx.restore();
  const a = document.createElement('a');
  a.download = 'air-draw.png';
  a.href = saveCanvas.toDataURL('image/png');
  a.click();
});
</script>
</body>
</html>
